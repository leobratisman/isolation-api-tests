name: Isolation Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build base Docker image
        run: docker build -t base-service .

      - name: Start test services
        run: docker compose -f docker-compose.ci.yaml up -d --build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Isolation tests and generate Allure report
        run: python -m pytest -m "regression" --alluredir=./allure-results

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results

  publish-report:
    if: always()

    needs: [ run-tests ]

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download Allure results
        uses: actions/download-artifact@v6
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
